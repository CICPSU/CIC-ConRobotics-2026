type: joint
unit: rad
joints: [swing_joint, boom_joint, arm_joint, bucket_joint]
interp: linear
densify_dt: 0.20

keyframes:
  # ------------------------------------------------------------
  # 0) Home / settle
  # ------------------------------------------------------------
  - t: 0.0
    q: [0.00, -0.10, 0.60, -0.20]
  - t: 0.8
    q: [0.00, -0.10, 0.60, -0.20]

  # ------------------------------------------------------------
  # 1) Approach to ground
  # ------------------------------------------------------------
  - t: 2.0
    q: [0.00, 0.28, 0.88, 0.18]

  # ------------------------------------------------------------
  # 2) CUT: push into soil (cutting feel)
  #    boom down + arm extend + bucket slightly open
  # ------------------------------------------------------------
  - t: 3.2
    q: [0.00, -0.36, 1.00, -0.10]
  - t: 4.0
    q: [0.00, -0.40, 1.06, -0.08]

  # ------------------------------------------------------------
  # 3) CURL: scoop while low
  # ------------------------------------------------------------
  - t: 4.8
    q: [0.00, -0.39, 1.03, -0.55]
  - t: 5.4
    q: [0.00, -0.37, 0.98, -0.75]

  # ------------------------------------------------------------
  # 4) LIFT-OUT: lift the load (hold it)
  # ------------------------------------------------------------
  - t: 6.8
    q: [0.00, -0.12, 0.72, -0.72]

  # Raise up for "over the truck bed"
  - t: 7.6
    q: [0.00, -0.04, 0.62, -0.72]

  # ------------------------------------------------------------
  # 5) Stop before swing (adds weight)
  # ------------------------------------------------------------
  - t: 8.2
    q: [0.00, -0.04, 0.62, -0.72]

  # ------------------------------------------------------------
  # 6) SWING with CARRY (hug the load)
  #    Key change vs v4:
  #      - bucket more closed (-0.90)
  #      - arm slightly tucked (0.60)
  # ------------------------------------------------------------
  - t: 9.0
    q: [0.55, -0.04, 0.60, -0.90]
  - t: 10.0
    q: [1.25, -0.04, 0.60, -0.90]
  - t: 10.4
    q: [1.25, -0.04, 0.60, -0.90]

  # ------------------------------------------------------------
  # 7) Reach forward over the bed BEFORE dumping
  #    Return bucket to normal carry here (pre-dump posture)
  # ------------------------------------------------------------
  - t: 11.2
    q: [1.25, -0.02, 0.52, -0.72]
  - t: 11.7
    q: [1.25, -0.02, 0.52, -0.72]

  # ------------------------------------------------------------
  # 8) Dump: open bucket + hold
  # ------------------------------------------------------------
  - t: 12.6
    q: [1.25, -0.02, 0.52, 0.30]
  - t: 13.6
    q: [1.25, -0.02, 0.52, 0.30]

  # Small shake (subtle, controlled)
  - t: 14.0
    q: [1.25, -0.02, 0.52, 0.18]
  - t: 14.4
    q: [1.25, -0.02, 0.52, 0.30]
  - t: 14.8
    q: [1.25, -0.02, 0.52, 0.18]
  - t: 15.2
    q: [1.25, -0.02, 0.52, 0.30]

  # ------------------------------------------------------------
  # 9) Close bucket + brief hold (dump finished beat)
  # ------------------------------------------------------------
  - t: 16.1
    q: [1.25, -0.02, 0.52, -0.72]
  - t: 16.5
    q: [1.25, -0.02, 0.52, -0.72]

  # ------------------------------------------------------------
  # 10) Retract from bed
  # ------------------------------------------------------------
  - t: 17.3
    q: [1.25, -0.04, 0.62, -0.72]

  # ------------------------------------------------------------
  # 11) Swing back (keep raised posture)
  # ------------------------------------------------------------
  - t: 18.3
    q: [0.55, -0.04, 0.62, -0.72]
  - t: 19.3
    q: [0.00, -0.04, 0.62, -0.72]

  # ------------------------------------------------------------
  # 12) Lower back to normal carry then home
  # ------------------------------------------------------------
  - t: 20.2
    q: [0.00, -0.12, 0.72, -0.72]
  - t: 21.6
    q: [0.00, -0.10, 0.60, -0.20]
